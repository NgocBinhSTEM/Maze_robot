<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robot mê cung 2026</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #123b7a, #061b45);
  font-family: Arial;
  overflow: hidden;
}

/* ===== DESKTOP MENU ===== */
.quick-menu {
  position: fixed;
  right: 40px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 12px;
  z-index: 20;
}

.quick-menu a {
  padding: 12px 16px;
  color: white;
  text-decoration: none;
  border-radius: 12px;
  background: rgba(0,40,90,.7);
  border: 1px solid rgba(0,234,255,.4);
  display: flex;
  gap: 10px;
  align-items: center;
}

.quick-menu a:hover {
  background: rgba(0,140,255,.8);
}

.icon { width: 20px; text-align: center; }

/* ===== INTRO ===== */
.intro {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle, #09265c, #020814);
  display: flex;
  justify-content: center;
  align-items: center;
  animation: introOut 3s forwards;
  z-index: 100;
}

.intro-box {
  text-align: center;
  color: white;
}

.intro-box h1 {
  font-size: 60px;
  text-shadow: 0 0 20px cyan;
}

.intro-box p {
  font-size: 22px;
  color: gold;
}

@keyframes introOut {
  0%,60%{opacity:1}
  100%{opacity:0;visibility:hidden}
}

/* ===== PAGE ===== */
.page {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding-right: 220px;
}

.container {
  height: 85vh;
  aspect-ratio: 1536/1024;
  position: relative;
}

.poster {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* ===== HOTSPOT ===== */
.btn {
  position: absolute;
  border: 3px dashed gold;
  border-radius: 10px;
}

.doc { left:72%; top:70%; width:14%; height:21%; }
.register { left:86%; top:70%; width:13%; height:21%; }

/* ===== MOBILE MENU ===== */
.menu-toggle { display: none; }
.mobile-menu { display: none; }

/* ===== MOBILE ===== */
@media (max-width:768px){

  .quick-menu{display:none;}

  .menu-toggle{
    display:flex;
    position:fixed;
    top:10px;
    right:10px;
    width:44px;height:44px;
    background:#123b7a;
    color:white;
    justify-content:center;
    align-items:center;
    border-radius:10px;
    z-index:50;
  }

  .mobile-menu{
    position:fixed;
    top:0;left:0;right:0;
    background:#061b45;
    display:flex;
    flex-direction:column;
    gap:10px;
    padding:70px 20px;
    transform:translateY(-100%);
    transition:.3s;
    z-index:40;
  }

  .mobile-menu.show{transform:translateY(0);}

  .mobile-menu a{
    color:white;
    text-decoration:none;
    padding:12px;
    border-radius:10px;
    background:#123b7a;
  }

  .page{padding:0;}

  .container{
    width:100vw;
    height:auto;
  }

  .poster{
    width:100%;
    height:auto;
  }

  .btn{display:none;}

  /* ===== FIX CLICK MOBILE ===== */
  .mobile-actions{
    position:fixed;
    bottom:calc(14px + env(safe-area-inset-bottom));
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
    width:90%;
    max-width:400px;
    padding:6px;
    border-radius:20px;
    background:rgba(0,0,0,.5);
    z-index:30;
    pointer-events:auto; /* FIX QUAN TRỌNG */
  }

  .mobile-actions a{
    flex:1;
    text-align:center;
    color:white;
    text-decoration:none;
    padding:12px;
    border-radius:12px;
  }

  .doc-btn{background:#0077ff;}
  .reg-btn{background:#ff3d3d;}
}

/* ===== LANDSCAPE FIX ===== */
@media (max-width:768px) and (orientation:landscape){

  .mobile-actions{
    bottom:10px;
    width:70%;
  }

  .mobile-actions a{
    padding:10px;
    font-size:13px;
  }
}

</style>
</head>

<body>

<!-- DESKTOP MENU -->
<div class="quick-menu">
  <a href="#"><span class="icon">🏠</span>Trang chủ</a>
  <a href="#"><span class="icon">📢</span>Thông báo</a>
  <a href="https://drive.google.com/file/d/1GDow_MACvpng2_aSyfpqXLZHvnGWM7_K/view?usp=sharing" target="_blank">
    <span class="icon">📄</span>Tài liệu
  </a>
  <a href="#"><span class="icon">🎥</span>Video</a>
  <a href="#"><span class="icon">🖼️</span>Thư viện</a>
  <a href="#"><span class="icon">💬</span>Trợ giúp</a>
</div>

<!-- MOBILE MENU -->
<div class="menu-toggle" onclick="toggleMenu()">☰</div>

<div class="mobile-menu" id="menu">
  <a href="#">Trang chủ</a>
  <a href="#">Thông báo</a>
  <a href="https://drive.google.com/file/d/1GDow_MACvpng2_aSyfpqXLZHvnGWM7_K/view?usp=sharing" target="_blank">Tài liệu</a>
  <a href="#">Video</a>
  <a href="#">Thư viện</a>
  <a href="#">Trợ giúp</a>
</div>

<!-- INTRO -->
<div class="intro">
  <div class="intro-box">
    <h1>Robot Mê Cung</h1>
    <p>Công nghệ • Bản lĩnh • Sáng tạo</p>
  </div>
</div>

<!-- MAIN -->
<div class="page">
  <div class="container">
    <img src="Poster.webp" class="poster">

    <a class="btn doc" href="https://drive.google.com/file/d/1GDow_MACvpng2_aSyfpqXLZHvnGWM7_K/view?usp=sharing" target="_blank"></a>

    <a class="btn register" href="https://forms.gle/KQKUknf6ktijzLQ27" target="_blank"></a>
  </div>
</div>

<!-- MOBILE BUTTON -->
<div class="mobile-actions">
  <a href="https://drive.google.com/file/d/1GDow_MACvpng2_aSyfpqXLZHvnGWM7_K/view?usp=sharing" target="_blank" class="doc-btn">
    📄 Tài liệu
  </a>
  <a href="https://forms.gle/KQKUknf6ktijzLQ27" target="_blank" class="reg-btn">
    📝 Đăng ký
  </a>
</div>

<script>
function toggleMenu(){
  document.getElementById("menu").classList.toggle("show");
}
</script>

</body>
</html>
