<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuộc thi "Robot mê cung" năm 2026</title>

<style>

/* ===== GLOBAL ===== */
body {
  margin: 0;
  background: radial-gradient(circle at top, #123b7a, #061b45);
  min-height: 100vh;
  font-family: Arial;
  overflow: hidden;
}

/* ===== INTRO (DESKTOP) ===== */
.intro {
  position: fixed;
  inset: 0;
  z-index: 10;
  background: linear-gradient(rgba(0,20,60,.9), rgba(0,5,20,.95));
  display: flex;
  justify-content: center;
  align-items: center;
  animation: introOut 2.8s ease forwards;
}

.intro-box {
  text-align: center;
  color: white;
}

.intro-box h1 {
  font-size: clamp(32px, 6vw, 72px);
  text-shadow: 0 0 20px gold;
}

.intro-box p {
  letter-spacing: 2px;
}

@keyframes introOut {
  0%, 60% { opacity: 1; }
  100% { opacity: 0; visibility: hidden; }
}

/* ===== PAGE ===== */
.page {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  animation: posterIn 3s ease forwards;
}

@keyframes posterIn {
  0%, 60% { opacity: 0; }
  100% { opacity: 1; }
}

/* ===== POSTER ===== */
.container {
  position: relative;
  height: 90vh;
  aspect-ratio: 1536 / 1024;
}

.poster {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}

/* ===== HOTSPOT BUTTON ===== */
.btn {
  position: absolute;
  border: 3px dashed gold;
  border-radius: 12px;
  background: rgba(255,215,0,0.15);
  cursor: pointer;
}

.btn:hover {
  transform: scale(1.05);
  background: rgba(255,215,0,0.35);
}

/* Pulse */
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(255,215,0,0.7); }
  70% { box-shadow: 0 0 0 15px rgba(255,215,0,0); }
}

.doc {
  left: 72.5%;
  top: 70.2%;
  width: 13.6%;
  height: 20.6%;
  animation: pulse 2s infinite;
}

.register {
  left: 86.2%;
  top: 70.2%;
  width: 12.8%;
  height: 20.6%;
  animation: pulse 2s infinite;
  animation-delay: 1s;
}

/* ===== MOBILE ===== */
@media (max-width: 768px) {

  body {
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100svh;
  }

  .intro {
    display: none;
  }

  .page {
    animation: none;
    width: 100vw;
    height: 100svh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding-bottom: 90px;
  }

  .container {
    width: 100vw;
    height: auto;
    aspect-ratio: 1536 / 1024;
  }

  .poster {
    width: 100%;
    height: auto;
  }

  /* Ẩn hotspot nhỏ */
  .btn {
    display: none;
  }

  /* ===== ACTION BAR ===== */
  .mobile-actions {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    gap: 10px;
    padding: 12px;
    background: linear-gradient(to top, rgba(0,0,0,.9), rgba(0,0,0,.5));
  }

  .mobile-actions a {
    flex: 1;
    text-align: center;
    text-decoration: none;
    color: white;
    font-weight: bold;
    padding: 14px;
    border-radius: 14px;
    background: linear-gradient(135deg, #0047b3, #0077ff);
  }

  .mobile-actions a:last-child {
    background: linear-gradient(135deg, #b00000, #ff2d2d);
  }
}

</style>
</head>

<body>

<!-- INTRO -->
<div class="intro">
  <div class="intro-box">
    <h1>Robot Mê Cung</h1>
    <p>Công nghệ • Bản lĩnh • Sáng tạo</p>
  </div>
</div>

<!-- MAIN -->
<div class="page">
  <div class="container">

    <img src="https://uploads.onecompiler.io/43n2pjfqw/44prta6qq/Poster.jpg" class="poster">

    <a class="btn doc" href="http://bit.ly/4dzSNSg" target="_blank"></a>
    <a class="btn register" href="https://forms.gle/KQKUknf6ktijzLQ27" target="_blank"></a>

  </div>
</div>

<!-- MOBILE BUTTON -->
<div class="mobile-actions">
  <a href="http://bit.ly/4dzSNSg" target="_blank">📄 Tài liệu</a>
  <a href="https://forms.gle/KQKUknf6ktijzLQ27" target="_blank">📝 Đăng ký</a>
</div>

</body>
</html>
