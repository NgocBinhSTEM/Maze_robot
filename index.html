<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuộc thi Robot mê cung 2026</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #123b7a, #061b45);
  min-height: 100vh;
  font-family: Arial, Helvetica, sans-serif;
  overflow: hidden;
}

/* ===== DESKTOP MENU ===== */
.quick-menu {
  position: fixed;
  right: clamp(28px, 3vw, 60px);
  top: 50%;
  transform: translateY(-50%);
  z-index: 20;
  display: flex;
  flex-direction: column;
  gap: 12px;
  opacity: 0;
  pointer-events: none;
  animation: showMenu .6s ease forwards;
  animation-delay: 3s;
}

.quick-menu a {
  min-width: 180px;
  padding: 12px 16px;
  text-decoration: none;
  color: white;
  font-weight: 600;
  font-size: 13px;
  border-radius: 12px;
  background: rgba(0,40,90,.65);
  border: 1px solid rgba(0,234,255,.45);
  backdrop-filter: blur(12px);
  box-shadow: 0 8px 22px rgba(0,0,0,.28), inset 0 0 8px rgba(0,234,255,.08);
  display: flex;
  align-items: center;
  gap: 10px;
  transition: .2s ease;
}

.quick-menu a:hover {
  transform: translateX(-5px);
  background: rgba(0,140,255,.85);
  box-shadow: 0 10px 26px rgba(0,0,0,.35), 0 0 18px rgba(0,234,255,.5);
}

.quick-menu .icon {
  font-size: 16px;
  width: 20px;
  text-align: center;
}

@keyframes showMenu {
  to {
    opacity: 1;
    pointer-events: auto;
  }
}

/* ===== MOBILE MENU ===== */
.menu-toggle { display: none; }
.mobile-menu { display: none; }

/* ===== INTRO HUD QUÂN SỰ (GIỮ NGUYÊN) ===== */
.intro {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,170,255,.30), transparent 32%),
    radial-gradient(circle at 80% 75%, rgba(0,255,180,.18), transparent 34%),
    radial-gradient(circle at center, #09265c, #020814 82%);
  animation: introOut 3s ease forwards;
}

.intro::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(2px 2px at 15% 25%, rgba(255,255,255,.9), transparent),
    radial-gradient(1px 1px at 35% 60%, rgba(255,255,255,.8), transparent),
    radial-gradient(2px 2px at 70% 35%, rgba(255,255,255,.9), transparent),
    radial-gradient(1px 1px at 85% 75%, rgba(255,255,255,.8), transparent),
    linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px);
  background-size: auto, auto, auto, auto, 100% 6px;
  opacity: .55;
  animation: twinkle 2.5s infinite alternate;
}

.intro::after {
  content: "";
  position: absolute;
  inset: 0;
  background: url("Logo Khoa HKVT_VIETNAM.webp") center no-repeat;
  background-size: clamp(190px, 58vmin, 560px);
  opacity: .20;
  filter: blur(.6px);
  pointer-events: none;
}

.hud-frame {
  position: absolute;
  width: min(92vw, 1100px);
  height: min(75vh, 700px);
  border: 1px solid rgba(0,234,255,.55);
  box-shadow: 0 0 22px rgba(0,234,255,.25), inset 0 0 28px rgba(0,234,255,.12);
  clip-path: polygon(4% 0, 96% 0, 100% 10%, 100% 90%, 96% 100%, 4% 100%, 0 90%, 0 10%);
  z-index: 1;
}

.hud-frame::before,
.hud-frame::after {
  content: "";
  position: absolute;
  width: 72px;
  height: 72px;
  border-color: #00eaff;
  border-style: solid;
  opacity: .9;
}

.hud-frame::before {
  left: 18px;
  top: 18px;
  border-width: 3px 0 0 3px;
}

.hud-frame::after {
  right: 18px;
  bottom: 18px;
  border-width: 0 3px 3px 0;
}

.hud-scan {
  position: absolute;
  width: min(92vw, 1100px);
  height: 3px;
  background: linear-gradient(90deg, transparent, #00eaff, transparent);
  box-shadow: 0 0 18px #00eaff;
  z-index: 2;
  animation: hudScan 1.8s linear infinite;
}

.hud-radar {
  position: absolute;
  width: 145px;
  height: 145px;
  right: calc(50% - min(46vw, 550px) + 36px);
  bottom: calc(50% - min(37.5vh, 350px) + 28px);
  border: 1px solid rgba(0,234,255,.65);
  border-radius: 50%;
  z-index: 2;
  box-shadow: inset 0 0 20px rgba(0,234,255,.18);
}

.hud-radar::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: conic-gradient(from 0deg, rgba(0,234,255,.45), transparent 55deg, transparent);
  animation: radarSpin 1.5s linear infinite;
}

@keyframes introOut { 0%,65%{opacity:1}100%{opacity:0;visibility:hidden} }
@keyframes hudScan { 0%{transform:translateY(-38vh)}100%{transform:translateY(38vh)} }
@keyframes radarSpin { to{transform:rotate(360deg)} }

/* ===== PAGE ===== */
.page {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding-left: clamp(48px, 5vw, 96px);
  padding-right: clamp(130px, 14vw, 210px);
}

.container {
  position: relative;
  height: min(88vh, 58vw);
  aspect-ratio: 1536 / 1024;
}

.poster {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.btn {
  position: absolute;
  border: 3px dashed gold;
  border-radius: 12px;
}

.doc { left:72.5%; top:70.2%; width:13.6%; height:20.6%; }
.register { left:86.2%; top:70.2%; width:12.8%; height:20.6%; }

/* ===== MOBILE ===== */
@media (max-width:768px){

  .quick-menu{display:none;}

  .menu-toggle{
    display:flex;
    position:fixed;
    top:10px;
    right:10px;
    width:44px;height:44px;
    background:#123b7a;
    color:white;
    justify-content:center;
    align-items:center;
    border-radius:10px;
    z-index:50;
  }

  .mobile-menu{
    position:fixed;
    top:0;left:0;right:0;
    background:#061b45;
    display:flex;
    flex-direction:column;
    gap:10px;
    padding:70px 20px;
    transform:translateY(-100%);
    transition:.3s;
    z-index:40;
  }

  .mobile-menu.show{transform:translateY(0);}

  .container{width:100vw;height:auto;}
  .poster{width:100%;height:auto;}
  .btn{display:none;}

  .mobile-actions{
    position:fixed;
    bottom:calc(14px + env(safe-area-inset-bottom));
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
    width:90%;
    max-width:400px;
    padding:6px;
    border-radius:20px;
    background:rgba(0,0,0,.5);
    z-index:30;

    pointer-events:auto; /* ✅ FIX */

  }

  .mobile-actions a{
    flex:1;
    text-align:center;
    color:white;
    text-decoration:none;
    padding:12px;
    border-radius:12px;
  }

  .doc-btn{background:#0077ff;}
  .reg-btn{background:#ff3d3d;}
}
</style>
</head>

<body>

<div class="quick-menu">

<div class="intro">

    <div class="status">KHOA HÀNG KHÔNG VŨ TRỤ</div>
    <h1>Robot Mê Cung</h1>
    <p>Công nghệ • Bản lĩnh • Sáng tạo</p>

<div class="page">

<div class="mobile-actions">

<script>
function toggleMenu(){
  document.getElementById("menu").classList.toggle("show");
}
</script>

</body>
</html>
