<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Robot Mê Cung</title>

  <style>
    body {
      margin: 0;
      background: #061b45;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* ===== KHUNG CHÍNH - AUTO FIT ===== */
    .container {
      position: relative;
      height: 90vh;                 /* tự co theo chiều cao màn hình */
      aspect-ratio: 1536 / 1024;    /* giữ đúng tỷ lệ poster */
    }

    .poster {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* ===== NÚT CLICK ===== */
    .btn {
      position: absolute;
      border: 3px dashed #FFD700;
      border-radius: 12px;
      background: rgba(255, 215, 0, 0.15);
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      animation: none;
      background: rgba(255, 215, 0, 0.35);
      transform: scale(1.05);
    }

    /* ===== PULSE ===== */
    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7);
      }
      70% {
        box-shadow: 0 0 0 15px rgba(255, 215, 0, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(255, 215, 0, 0);
      }
    }

    /* ===== ICON NHẢY ===== */
    @keyframes bounce {
      0%, 100% { transform: translate(-50%, 0); }
      50% { transform: translate(-50%, -6px); }
    }

    .icon {
      position: absolute;
      top: -28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
      animation: bounce 1.2s infinite;
    }

    .label {
      position: absolute;
      bottom: -34px;
      left: 50%;
      transform: translateX(-50%);
      background: #001c54;
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: bold;
      white-space: nowrap;
    }

    /* ===== VỊ TRÍ (THEO % NÊN KHÔNG BỊ LỆCH KHI SCALE) ===== */

    .doc {
      left: 72.5%;
      top: 70.2%;
      width: 13.6%;
      height: 20.6%;
      animation: pulse 2s infinite;
    }

    .register {
      left: 86.2%;
      top: 70.2%;
      width: 12.8%;
      height: 20.6%;
      animation: pulse 2s infinite;
      animation-delay: 1s; /* lệch pha */
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- ẢNH POSTER -->
    <img 
      src="https://uploads.onecompiler.io/43n2pjfqw/44prta6qq/Poster.jpg" 
      class="poster"
    >

    <!-- TÀI LIỆU -->
    <a class="btn doc"
       href="http://bit.ly/4dzSNSg"
       target="_blank">
       <div class="icon">📄</div>
       <div class="label">Tài liệu chi tiết</div>
    </a>

    <!-- ĐĂNG KÝ -->
    <a class="btn register"
       href="https://forms.gle/KQKUknf6ktijzLQ27"
       target="_blank">
       <div class="icon">📝</div>
       <div class="label">Đăng ký tham gia</div>
    </a>

  </div>

</body>
</html>
