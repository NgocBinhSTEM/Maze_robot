<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Robot Mê Cung</title>
  <style>
    body {
      margin: 0;
      background: #061b45;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      position: relative;
      width: 1536px;
      max-width: 100%;
    }

    .poster {
      width: 100%;
      display: block;
    }

    .btn {
      position: absolute;
      border: 3px dashed #FFD700;
      border-radius: 12px;
      background: rgba(255, 215, 0, 0.15);
      cursor: pointer;
      animation: pulse 2s infinite;
      transition: 0.2s;
    }

    .btn:hover {
      animation: none;
      background: rgba(255, 215, 0, 0.35);
      transform: scale(1.05);
    }

    /* ===== HIỆU ỨNG PULSE ===== */
    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7);
      }
      70% {
        box-shadow: 0 0 0 15px rgba(255, 215, 0, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(255, 215, 0, 0);
      }
    }

    .label {
      position: absolute;
      bottom: -30px;
      left: 50%;
      transform: translateX(-50%);
      background: #001c54;
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: bold;
      white-space: nowrap;
    }

    /* ===== VỊ TRÍ ===== */

    .doc {
      left: 72.5%;
      top: 70.2%;
      width: 13.6%;
      height: 20.6%;
    }

    .register {
      left: 86.2%;
      top: 70.2%;
      width: 12.8%;
      height: 20.6%;
    }

  </style>
</head>

<body>
  <div class="container">
    
    <img src="https://uploads.onecompiler.io/43n2pjfqw/44prta6qq/Poster.jpg" class="poster">

    <!-- TÀI LIỆU -->
    <a class="btn doc"
       href="http://bit.ly/4dzSNSg"
       target="_blank">
       <div class="label">📄 Tài liệu chi tiết</div>
    </a>

    <!-- ĐĂNG KÝ -->
    <a class="btn register"
       href="https://forms.gle/KQKUknf6ktijzLQ27"
       target="_blank">
       <div class="label">📝 Đăng ký tham gia</div>
    </a>

  </div>
</body>
</html>
