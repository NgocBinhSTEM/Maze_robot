<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuộc thi Robot mê cung 2026</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #123b7a, #061b45);
  min-height: 100vh;
  font-family: Arial, Helvetica, sans-serif;
  overflow: hidden;
}

/* ===== DESKTOP MENU ===== */
.quick-menu {
  position: fixed;
  right: clamp(28px, 3vw, 60px);
  top: 50%;
  transform: translateY(-50%);
  z-index: 20;
  display: flex;
  flex-direction: column;
  gap: 12px;
  opacity: 0;
  pointer-events: none;
  animation: showMenu .6s ease forwards;
  animation-delay: 3s;
}

.quick-menu a {
  min-width: 180px;
  padding: 12px 16px;
  text-decoration: none;
  color: white;
  font-weight: 600;
  font-size: 13px;
  border-radius: 12px;
  background: rgba(0,40,90,.65);
  border: 1px solid rgba(0,234,255,.45);
  backdrop-filter: blur(12px);
  box-shadow: 0 8px 22px rgba(0,0,0,.28), inset 0 0 8px rgba(0,234,255,.08);
  display: flex;
  align-items: center;
  gap: 10px;
}

.quick-menu .icon {
  font-size: 16px;
  width: 20px;
  text-align: center;
}

@keyframes showMenu {
  to {
    opacity: 1;
    pointer-events: auto;
  }
}

/* ===== INTRO HUD (GIỮ NGUYÊN) ===== */
.intro {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,170,255,.30), transparent 32%),
    radial-gradient(circle at 80% 75%, rgba(0,255,180,.18), transparent 34%),
    radial-gradient(circle at center, #09265c, #020814 82%);
  animation: introOut 3s ease forwards;
}

.intro-box {
  position: relative;
  z-index: 3;
  text-align: center;
  color: white;
}

.intro-box h1 {
  font-size: clamp(36px, 6vw, 76px);
  text-shadow: 0 0 20px cyan;
}

.intro-box p {
  font-size: clamp(16px, 2vw, 28px);
  color: gold;
}

@keyframes introOut {
  0%, 65% { opacity: 1; }
  100% { opacity: 0; visibility: hidden; }
}

/* ===== PAGE ===== */
.page {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding-right: 220px;
}

.container {
  height: 85vh;
  aspect-ratio: 1536 / 1024;
  position: relative;
}

.poster {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* ===== HOTSPOT ===== */
.btn {
  position: absolute;
  border: 3px dashed gold;
  border-radius: 10px;
}

.doc { left:72%; top:70%; width:14%; height:21%; }
.register { left:86%; top:70%; width:13%; height:21%; }

/* ===== MOBILE ===== */
.menu-toggle { display: none; }
.mobile-menu { display: none; }

@media (max-width:768px){

  .quick-menu{display:none;}

  .menu-toggle{
    display:flex;
    position:fixed;
    top:10px;
    right:10px;
    width:44px;height:44px;
    background:#123b7a;
    color:white;
    justify-content:center;
    align-items:center;
    border-radius:10px;
    z-index:50;
  }

  .mobile-menu{
    position:fixed;
    top:0;left:0;right:0;
    background:#061b45;
    display:flex;
    flex-direction:column;
    gap:10px;
    padding:70px 20px;
    transform:translateY(-100%);
    transition:.3s;
    z-index:40;
  }

  .mobile-menu.show{transform:translateY(0);}

  .mobile-menu a{
    color:white;
    text-decoration:none;
    padding:12px;
    border-radius:10px;
    background:#123b7a;
  }

  .page{padding:0;}

  .container{
    width:100vw;
    height:auto;
  }

  .poster{
    width:100%;
    height:auto;
  }

  .btn{display:none;}

  /* ===== FIX MOBILE CLICK ===== */
  .mobile-actions{
    position:fixed;
    bottom:calc(14px + env(safe-area-inset-bottom));
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
    width:90%;
    max-width:400px;
    padding:6px;
    border-radius:20px;
    background:rgba(0,0,0,.5);
    z-index:30;

    pointer-events:auto; /* FIX */

  }

  .mobile-actions a{
    flex:1;
    text-align:center;
    color:white;
    text-decoration:none;
    padding:12px;
    border-radius:12px;
  }

  .doc-btn{background:#0077ff;}
  .reg-btn{background:#ff3d3d;}
}

/* ===== LANDSCAPE ===== */
@media (max-width:768px) and (orientation:landscape){
  .mobile-actions{
    bottom:10px;
    width:70%;
  }
}
</style>
</head>

<body>

<!-- DESKTOP MENU -->
<div class="quick-menu">
  <a href="#"><span class="icon">🏠</span> Trang chủ</a>
  <a href="#"><span class="icon">📢</span> Thông báo</a>
  <a href="https://drive.google.com/file/d/1GDow_MACvpng2_aSyfpqXLZHvnGWM7_K/view?usp=sharing" target="_blank">
    <span class="icon">📄</span> Tài liệu
  </a>
</div>

<!-- MOBILE MENU -->
<div class="menu-toggle" onclick="toggleMenu()">☰</div>

<div class="mobile-menu" id="menu">
  <a href="#">Trang chủ</a>
  <a href="#">Thông báo</a>
  <a href="https://drive.google.com/file/d/1GDow_MACvpng2_aSyfpqXLZHvnGWM7_K/view?usp=sharing" target="_blank">Tài liệu</a>
</div>

<!-- INTRO -->
<div class="intro">
  <div class="intro-box">
    <h1>Robot Mê Cung</h1>
    <p>Công nghệ • Bản lĩnh • Sáng tạo</p>
  </div>
</div>

<!-- MAIN -->
<div class="page">
  <div class="container">
    <img src="Poster.webp" class="poster">

    <a class="btn doc"
       href="https://drive.google.com/file/d/1GDow_MACvpng2_aSyfpqXLZHvnGWM7_K/view?usp=sharing"
       target="_blank"></a>

    <a class="btn register"
       href="https://forms.gle/KQKUknf6ktijzLQ27"
       target="_blank"></a>
  </div>
</div>

<!-- MOBILE BUTTON -->
<div class="mobile-actions">
  <a href="https://drive.google.com/file/d/1GDow_MACvpng2_aSyfpqXLZHvnGWM7_K/view?usp=sharing" target="_blank" class="doc-btn">
    📄 Tài liệu
  </a>
  <a href="https://forms.gle/KQKUknf6ktijzLQ27" target="_blank" class="reg-btn">
    📝 Đăng ký
  </a>
</div>

<script>
function toggleMenu(){
  document.getElementById("menu").classList.toggle("show");
}
</script>

</body>
</html>
